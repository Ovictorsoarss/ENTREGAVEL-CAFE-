<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Café com Fé — Seus Entregáveis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #F5EDE0;
      --primary: #B8864E;
      --primary-dark: #9A6F3C;
      --text: #2C1810;
      --accent: #C9A07A;
      --white-soft: #FDFAF6;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    .logo-icon {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.25rem;
    }

    h1 span {
      color: var(--primary);
    }

    .subtitle {
      font-size: 0.95rem;
      color: var(--accent);
      margin-bottom: 2.5rem;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: var(--primary);
      margin: 0 auto 2.5rem;
      border-radius: 2px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--white-soft);
      border: 1.5px solid rgba(184, 134, 78, 0.15);
      border-radius: 1rem;
      padding: 1.15rem 1.25rem;
      text-decoration: none;
      color: var(--text);
      transition: all 0.3s ease;
      box-shadow: 0 2px 12px rgba(44, 24, 16, 0.06);
    }

    .link-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(184, 134, 78, 0.18);
      border-color: var(--primary);
    }

    .link-icon {
      width: 48px;
      height: 48px;
      border-radius: 0.75rem;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1.3rem;
    }

    .link-info {
      text-align: left;
      flex: 1;
    }

    .link-title {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: 1.05rem;
      line-height: 1.3;
    }

    .link-desc {
      font-size: 0.8rem;
      color: var(--accent);
      margin-top: 0.15rem;
    }

    .link-arrow {
      color: var(--primary);
      font-size: 1.2rem;
      flex-shrink: 0;
      transition: transform 0.3s ease;
    }

    .link-card:hover .link-arrow {
      transform: translateX(4px);
    }

    .footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: var(--accent);
      line-height: 1.6;
    }

    .footer strong {
      color: var(--primary);
    }

    @media (max-width: 400px) {
      h1 { font-size: 1.6rem; }
      .link-card { padding: 1rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-icon">☕</div>
    <h1>Café com <span>Fé</span></h1>
    <p class="subtitle">Seus entregáveis estão aqui</p>
    <div class="divider"></div>

    <div class="links">
      <a href="https://canva.link/gec4uns8mm102jf" class="link-card" target="_blank" rel="noopener">
        <div class="link-icon">📖</div>
        <div class="link-info">
          <div class="link-title">Café com Fé</div>
          <div class="link-desc">Abrir no Canva</div>
        </div>
        <span class="link-arrow">→</span>
      </a>

      <a href="https://canva.link/cxrctqepma2sni6" class="link-card" target="_blank" rel="noopener">
        <div class="link-icon">🫙</div>
        <div class="link-info">
          <div class="link-title">Frente e Verso do Potinho</div>
          <div class="link-desc">Abrir no Canva</div>
        </div>
        <span class="link-arrow">→</span>
      </a>

      <a href="https://canva.link/s8geumc8lh6ry2h" class="link-card" target="_blank" rel="noopener">
        <div class="link-icon">✝️</div>
        <div class="link-info">
          <div class="link-title">365 Versículos — Coloridos</div>
          <div class="link-desc">Abrir no Canva</div>
        </div>
        <span class="link-arrow">→</span>
      </a>

      <a href="https://canva.link/rasv2atpxhx20r3" class="link-card" target="_blank" rel="noopener">
        <div class="link-icon">🌈</div>
        <div class="link-info">
          <div class="link-title">365 Versículos — Opção 2</div>
          <div class="link-desc">Abrir no Canva</div>
        </div>
        <span class="link-arrow">→</span>
      </a>
    </div>

    <div class="footer">
      Obrigado por sua compra! 🤎<br>
      Com carinho, <strong>Café com Fé</strong>
    </div>
  </div>
</body>
</html>
